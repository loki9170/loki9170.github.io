        // 获取URL参数中的产品ID
        function getProductId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // 加载产品详情
        function loadProductDetails() {
            const productId = getProductId();
            const product = products[productId];
            
            if (product) {
                // 设置页面标题
                document.title = `${product.name} - 极简工业风家具`;
                
                // 填充产品信息
                document.getElementById('productName').textContent = product.name;
                document.getElementById('productDescription').textContent = product.description;
                document.getElementById('productPrice').textContent = product.price;
                document.getElementById('productImage').src = product.image;
                document.getElementById('productImage').alt = product.name;
                
                // 填充产品参数
                const featuresContainer = document.getElementById('productFeatures');
                featuresContainer.innerHTML = '';
                product.features.forEach(feature => {
                    const featureElement = document.createElement('p');
                    featureElement.className = 'flex items-start';
                    featureElement.innerHTML = `<span class="mr-2">•</span> ${feature}`;
                    featuresContainer.appendChild(featureElement);
                });
            } else {
                // 如果产品不存在，显示错误信息
                document.querySelector('main').innerHTML = `
                    <div class="text-center py-16">
                        <h1 class="text-2xl font-bold mb-4">产品不存在</h1>
                        <a href="index.html" class="text-black hover:underline">返回首页</a>
                    </div>
                `;
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadProductDetails);
