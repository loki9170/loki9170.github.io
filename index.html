    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const navbar = document.getElementById('navbar');
            const navLinks = document.querySelectorAll('.nav-link');
            const waterfallItems = document.querySelectorAll('.waterfall-item');
            const backToTopButton = document.getElementById('backToTop');
            
            // 导航链接点击事件
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    // 如果是"关于"链接，允许默认跳转行为
                    if (this.getAttribute('href') === 'about.html') {
                        // 移除所有链接的active类
                        navLinks.forEach(item => item.classList.remove('active'));
                        // 为当前点击的链接添加active类
                        this.classList.add('active');
                        // 不阻止默认跳转行为
                        return;
                    }
                    
                    // 对于其他链接，阻止默认跳转行为
                    e.preventDefault();
                    
                    // 移除所有链接的active类
                    navLinks.forEach(item => item.classList.remove('active'));
                    
                    // 为当前点击的链接添加active类
                    this.classList.add('active');
                    
                    // 这里可以添加页面切换逻辑
                    const target = this.getAttribute('data-target');
                    console.log(`导航到: ${target}`);
                });
            });

            // 瀑布流图片点击事件
            waterfallItems.forEach(item => {
                item.addEventListener('click', function() {
                    const productId = this.getAttribute('data-id');
                    // 跳转到产品详情页
                    window.location.href = `product.html?id=${productId}`;
                });
            });

            // 回到顶部按钮点击事件
            backToTopButton.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            // 监听滚动事件，控制回到顶部按钮的显示/隐藏
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    backToTopButton.classList.remove('opacity-0');
                    backToTopButton.classList.add('opacity-100');
                } else {
                    backToTopButton.classList.remove('opacity-100');
                    backToTopButton.classList.add('opacity-0');
                }
            });

            // 初始化回到顶部按钮为隐藏状态
            backToTopButton.classList.add('opacity-0', 'transition-opacity', 'duration-300');

            // 微信图标交互
            const wechatLink = document.getElementById('wechatLink');
            const wechatQRCode = document.getElementById('wechatQRCode');
            const navWechatLink = document.getElementById('navWechatLink');
            const wechatModal = document.getElementById('wechatModal');
            const closeWechatModal = document.getElementById('closeWechatModal');

            // 显示微信二维码浮窗
            function showWechatModal() {
                // 显示模态框
                wechatModal.classList.remove('opacity-0');
                wechatModal.classList.add('opacity-100');
                wechatModal.classList.remove('pointer-events-none');
            }

            // 隐藏微信二维码浮窗
            function hideWechatModal() {
                // 隐藏模态框
                wechatModal.classList.remove('opacity-100');
                wechatModal.classList.add('opacity-0');
                wechatModal.classList.add('pointer-events-none');
            }

            // 导航栏微信图标点击事件
            navWechatLink.addEventListener('click', function(e) {
                e.preventDefault();
                showWechatModal();
            });

            // 页脚微信图标点击事件
            wechatLink.addEventListener('click', function(e) {
                e.preventDefault();
                showWechatModal();
            });

            // 关闭按钮点击事件
            closeWechatModal.addEventListener('click', function() {
                hideWechatModal();
            });

            // 点击浮窗背景关闭浮窗
            wechatModal.addEventListener('click', function(e) {
                if (e.target === wechatModal || e.target === wechatModal.firstElementChild) {
                    hideWechatModal();
                }
            });

            // 按ESC键关闭浮窗
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !wechatModal.classList.contains('opacity-0')) {
                    hideWechatModal();
                }
            });
        });
    </script>
