    <style type="text/tailwindcss">
        @layer utilities {
            .nav-link {

            }
            
            .nav-link.active {

            .waterfall-container {
                column-count: 1;
                column-gap: 8px;
                @apply w-full;
                padding-left: 8px;
                padding-right: 8px;
                margin-top: 64px;

            @media (min-width: 640px) {

            @media (min-width: 1024px) {

            @media (min-width: 1280px) {

            }
            
            .waterfall-item {
                @apply overflow-hidden break-inside-avoid shadow-sm;
                border-radius: 3px;
                margin-bottom: 8px;
                transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            }
            
            .waterfall-item:hover {
                transform: translateY(-4px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            
            .waterfall-item img {
                @apply w-full h-auto transition-all duration-300 ease-in-out;
            }
            
            .waterfall-item img:hover {
                filter: brightness(0.9);
                transform: scale(1.02);
            }
        }
    </style>

    <!-- 微信二维码浮窗 -->
    <div id="wechatModal" class="fixed inset-0 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- 背景虚化效果 -->
        <div class="absolute inset-0 bg-black bg-opacity-60"></div>
        <!-- 二维码浮窗 -->

                <i class="fa fa-times"></i>

    <!-- 图片放大预览模态框 -->
    <div id="imageModal" class="fixed inset-0 flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- 背景虚化效果 -->
        <div class="absolute inset-0 bg-black bg-opacity-80"></div>
        <!-- 图片预览 -->
        <div class="relative max-w-4xl max-h-[90vh]">
            <button id="closeImageModal" class="absolute top-4 right-4 text-white hover:text-gray-300 bg-black bg-opacity-50 rounded-full p-2">
                <i class="fa fa-times text-xl"></i>
            </button>
            <img id="previewImage" src="" alt="预览图片" class="max-w-full max-h-[90vh] rounded-lg">
        </div>
    </div>

    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const navbar = document.getElementById('navbar');
            const navLinks = document.querySelectorAll('.nav-link');
            const waterfallItems = document.querySelectorAll('.waterfall-item');
            const backToTopButton = document.getElementById('backToTop');
            
            // 导航链接点击事件
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    // 如果是"关于"链接，允许默认跳转行为
                    if (this.getAttribute('href') === 'about.html') {
                        // 移除所有链接的active类
                        navLinks.forEach(item => item.classList.remove('active'));
                        // 为当前点击的链接添加active类
                        this.classList.add('active');
                        // 不阻止默认跳转行为
                        return;
                    }
                    
                    // 对于其他链接，阻止默认跳转行为
                    e.preventDefault();
                    
                    // 移除所有链接的active类
                    navLinks.forEach(item => item.classList.remove('active'));
                    
                    // 为当前点击的链接添加active类
                    this.classList.add('active');
                    
                    // 这里可以添加页面切换逻辑
                    const target = this.getAttribute('data-target');
                    console.log(`导航到: ${target}`);
                });
            });

            // 图片放大预览功能
            const imageModal = document.getElementById('imageModal');
            const previewImage = document.getElementById('previewImage');
            const closeImageModal = document.getElementById('closeImageModal');
            
            // 显示图片预览模态框
            function showImageModal(imageSrc) {
                previewImage.src = imageSrc;
                imageModal.classList.remove('opacity-0');
                imageModal.classList.add('opacity-100');
                imageModal.classList.remove('pointer-events-none');
                document.body.style.overflow = 'hidden';
            }
            
            // 隐藏图片预览模态框
            function hideImageModal() {
                imageModal.classList.remove('opacity-100');
                imageModal.classList.add('opacity-0');
                imageModal.classList.add('pointer-events-none');
                document.body.style.overflow = '';
            }
            
            // 瀑布流图片点击事件
            waterfallItems.forEach(item => {
                const img = item.querySelector('img');
                img.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const imageSrc = this.src;
                    showImageModal(imageSrc);
                });
                
                // 点击项目本身跳转到产品详情页
                item.addEventListener('click', function() {
                    const productId = this.getAttribute('data-id');
                    // 跳转到产品详情页
                    window.location.href = `product.html?id=${productId}`;
                });
            });
            
            // 关闭图片预览模态框
            closeImageModal.addEventListener('click', function() {
                hideImageModal();
            });
            
            // 点击模态框背景关闭
            imageModal.addEventListener('click', function(e) {
                if (e.target === imageModal || e.target === imageModal.firstElementChild) {
                    hideImageModal();
                }
            });
            
            // 按ESC键关闭图片预览模态框
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !imageModal.classList.contains('opacity-0')) {
                    hideImageModal();
                }
            });

            // 回到顶部按钮点击事件
            backToTopButton.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            // 监听滚动事件，控制回到顶部按钮的显示/隐藏
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    backToTopButton.classList.remove('opacity-0');
                    backToTopButton.classList.add('opacity-100');
                } else {
                    backToTopButton.classList.remove('opacity-100');
                    backToTopButton.classList.add('opacity-0');
                }
            });

            // 初始化回到顶部按钮为隐藏状态
            backToTopButton.classList.add('opacity-0', 'transition-opacity', 'duration-300');

            // 微信图标交互
            const wechatLink = document.getElementById('wechatLink');
            const wechatQRCode = document.getElementById('wechatQRCode');
            const navWechatLink = document.getElementById('navWechatLink');
            const wechatModal = document.getElementById('wechatModal');
            const closeWechatModal = document.getElementById('closeWechatModal');

            // 显示微信二维码浮窗
            function showWechatModal() {
                // 显示模态框
                wechatModal.classList.remove('opacity-0');
                wechatModal.classList.add('opacity-100');
                wechatModal.classList.remove('pointer-events-none');
            }

            // 隐藏微信二维码浮窗
            function hideWechatModal() {
                // 隐藏模态框
                wechatModal.classList.remove('opacity-100');
                wechatModal.classList.add('opacity-0');
                wechatModal.classList.add('pointer-events-none');
            }

            // 导航栏微信图标点击事件
            navWechatLink.addEventListener('click', function(e) {
                e.preventDefault();
                showWechatModal();
            });

            // 页脚微信图标点击事件
            wechatLink.addEventListener('click', function(e) {
                e.preventDefault();
                showWechatModal();
            });

            // 关闭按钮点击事件
            closeWechatModal.addEventListener('click', function() {
                hideWechatModal();
            });

            // 点击浮窗背景关闭浮窗
            wechatModal.addEventListener('click', function(e) {
                if (e.target === wechatModal || e.target === wechatModal.firstElementChild) {
                    hideWechatModal();
                }
            });

            // 按ESC键关闭浮窗
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !wechatModal.classList.contains('opacity-0')) {
                    hideWechatModal();
                }
            });
        });
    </script>
